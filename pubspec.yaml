name: solana_idl_codegen
description: Strict Anchor IDL to self-contained, transport-neutral Dart SDK generator for Solana programs, with CLI and builders.
version: 0.1.0

homepage: https://github.com/ntfnd404/solana_idl_codegen
repository: https://github.com/ntfnd404/solana_idl_codegen
issue_tracker: https://github.com/ntfnd404/solana_idl_codegen/issues

topics:
  - solana
  - anchor
  - codegen
  - borsh
  - idl

platforms:
  linux:
  macos:
  windows:

environment:
  sdk: ^3.12.2

executables:
  solana_idl_codegen: solana_idl_codegen

dependencies:
  args: ^2.7.0
  build: ^4.0.6
  build_config: ^1.3.0
  code_builder: ^4.11.1
  crypto: ^3.0.7
  dart_style: ^3.1.9
  path: ^1.9.1

dev_dependencies:
  analyzer: ^13.3.0
  build_test: ^3.5.15
  lints: ^6.1.0
  test: ^1.31.2
